<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring — 100% Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0b08;
  --bg2:     #161310;
  --bg3:     #1d1a12;
  --gold:    #c8a142;
  --gold2:   #e6c96a;
  --goldd:   #5a4218;
  --text:    #cec2a6;
  --dim:     #6a6050;
  --border:  #272318;
  --green:   #3d7a44;
  --green2:  #56b060;
  --warnbg:  #180f04;
  --warn:    #a87228;
  --tipbg:   #060e18;
  --tip:     #4070a0;
  --donebg:  #080f0a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:19px; line-height:1.65; }

header {
  background:var(--bg2); border-bottom:1px solid var(--goldd);
  padding:18px 28px; display:flex; align-items:center; gap:20px;
  position:sticky; top:0; z-index:50;
}
.h-title { font-family:'Cinzel',serif; font-size:19px; color:var(--gold); letter-spacing:.1em; }
.h-sub   { font-size:19px; color:var(--dim); letter-spacing:.07em; margin-top:2px; }
.h-right { margin-left:auto; display:flex; align-items:center; gap:18px; }
.pb-wrap { display:flex; flex-direction:column; gap:4px; min-width:160px; }
.pb-bar  { height:3px; background:var(--border); overflow:hidden; }
.pb-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--goldd),var(--gold)); transition:width .4s; }
.pb-lbl  { font-family:'Cinzel',serif; font-size:19px; color:var(--dim); text-align:right; }
.btn-rst { background:none; border:1px solid #5a2020; color:#7a4040; padding:5px 13px; font-family:'Cinzel',serif; font-size:19px; letter-spacing:.07em; cursor:pointer; text-transform:uppercase; transition:all .2s; }
.btn-rst:hover { background:#5a2020; color:#ffb0b0; }
.btn-ep-rst { background:none; border:1px solid #3a1a1a; color:#5a3030; padding:3px 9px; font-family:'Cinzel',serif; font-size:13px; letter-spacing:.07em; cursor:pointer; text-transform:uppercase; transition:all .2s; margin-right:4px; }
.btn-ep-rst:hover { background:#5a2020; color:#ffb0b0; border-color:#5a2020; }

.wrap { max-width:780px; margin:0 auto; padding:28px 18px 80px; }
.intro { border-left:3px solid var(--goldd); background:var(--bg2); padding:12px 16px; color:var(--dim); margin-bottom:24px; line-height:1.6; }
.intro strong { color:var(--gold); }

.ep { background:var(--bg2); border:1px solid var(--border); margin-bottom:8px; overflow:hidden; }
.ep.has-done { border-color:rgba(80,55,15,.7); }
.ep.complete { border-color:rgba(45,90,50,.8); }

.ep-hdr { display:flex; align-items:center; cursor:pointer; user-select:none; }
.ep-hdr:hover { background:var(--bg3); }
.ep-num  { font-family:'Cinzel',serif; font-size:19px; color:var(--goldd); letter-spacing:.1em; padding:15px 16px; border-right:1px solid var(--border); min-width:64px; text-align:center; line-height:1.4; }
.ep-name { flex:1; padding:15px 16px; font-family:'Cinzel',serif; font-size:19px; color:var(--text); letter-spacing:.03em; }
.ep-stat { font-family:'Cinzel',serif; font-size:19px; color:var(--dim); padding:0 12px; white-space:nowrap; }
.ep-stat.ok { color:var(--green2); }
.ep-arr  { padding:15px 16px; color:var(--goldd); font-size:19px; transition:transform .2s; }
.ep.open .ep-arr { transform:rotate(90deg); }
.ep.open .ep-arr { transform:rotate(90deg); }

.ep-body  { display:none; border-top:1px solid var(--border); }
.ep.open .ep-body { display:block; }
.ep-inner { padding:20px 22px 24px; }

.sec { font-family:'Cinzel',serif; font-size:19px; letter-spacing:.16em; text-transform:uppercase; color:var(--goldd); border-bottom:1px solid var(--border); padding-bottom:4px; margin:20px 0 8px; }
.sec:first-child { margin-top:0; }

.warn, .tip { padding:7px 12px; margin:7px 0; line-height:1.55; }
.warn { background:var(--warnbg); border-left:3px solid var(--warn); color:var(--warn); }
.tip  { background:var(--tipbg);  border-left:3px solid var(--tip);  color:var(--tip); }
.warn::before { content:'⚠  '; }
.tip::before  { content:'💡 '; }

.step { display:flex; align-items:flex-start; gap:9px; padding:5px 6px; cursor:pointer; border-left:2px solid transparent; transition:background .12s; }
.step:hover { background:var(--bg3); }
.step.done { background:var(--donebg); border-left-color:var(--green); }
.step.done .step-txt { color:var(--dim); text-decoration:line-through; text-decoration-color:#2a5030; }

.cb { width:18px; height:18px; min-width:18px; border:1px solid var(--goldd); margin-top:4px; flex-shrink:0; position:relative; transition:all .15s; }
.step.done .cb { background:var(--green); border-color:var(--green); }
.step.done .cb::after { content:'✓'; font-size:12px; color:#b0ffb8; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }

.step-txt { line-height:1.5; color:var(--text); }
.step-txt i { color:var(--gold2); font-style:normal; }

/* Spoiler / hidden state */
.step.hidden { cursor:pointer; }
.step.hidden .cb { opacity:.25; pointer-events:none; }
.step.hidden .step-txt { filter:blur(4px); user-select:none; pointer-events:none; opacity:.3; }
.step.hidden::after {
  content:'click to reveal';
  font-family:'Cinzel',serif; font-size:13px; letter-spacing:.08em;
  color:var(--goldd); margin-left:auto; padding-left:8px;
  white-space:nowrap; align-self:center; flex-shrink:0;
}

@media(max-width:560px){
  header { padding:12px 14px; flex-wrap:wrap; }
  .h-right { width:100%; }
  .ep-inner { padding:14px 14px 18px; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">Elden Ring</div>
    <div class="h-sub">100% Platinum Walkthrough</div>
  </div>
  <div class="h-right">
    <button class="btn-rst" onclick="resetAll()">Reset</button>
  </div>
</header>

<div class="wrap">
  <div class="intro">
    Each step is hidden — <strong>click to reveal</strong> it before reading.
    Click again to mark it as done. Progress is saved automatically in your browser.
  </div>
  <div id="app"></div>
</div>

<script>
const EPS = [
{
  id: 1,
  title: "Episode 01",
  steps: [
    "After intro cut scene: <i>Gesture: The Ring</i>",
    "Corpse on the right: <i>Tarnished's Wizened Finger</i>",
    "Open the double doors, move up and get killed by Grafted Scion",
    { t:'tip', text:"It is possible to kill the Grafted Scion now, but it's very difficult and not worth the trouble. We'll be back here much later to get our revenge." },
    "Cut scene → <i>3x Flask of Crimson Tears</i> + <i>1x Flask of Cerulean Tears</i>",
    "Jump down the hole to the right",
    "Move up → Site of Grace: Cave of Knowledge → Rest",
    "Do the Tutorial area",
    { t:'tip', text:"Unsheathe is an amazing Ash of War" },
    { t:'tip', text:"Use Jump Attacks vs Shield enemies to break their posture and get a critical hit" },
    { t:'tip', text:"Stealthing and backstabs — sneak behind enemies for free damage" },
    { t:'tip', text:"Spacing — let enemies swing first, then backstab" },
    { t:'tip', text:"Parrying — great when it works, but requires perfect timing and knowing the enemy's movesets. We'll rarely use it in this guide and rely on much safer mechanics instead." },
    "At the end of Tutorial area: <i>Gesture: Strength!</i>",
    "Open double doors → Site of Grace: Stranded Graveyard → Rest",
    "Move up, loot corpse on the right: <i>Finger Severer</i> + <i>Tarnished's Furled Finger</i>",
    "Take lift up and exit",
    "Talk to Varré 3 times",
    "Activate Site of Grace: The First Step",
    "Drop down to the right: <i>Small Golden Effigy</i>",
    "Head North to Church of Elleh — avoid the knight rider in golden armor",
    "<i>Golden Rune [2]</i> (in front of the church)",
    "Activate Site of Grace: Church of Elleh",
    "Talk to Kalé → \"About Kalé\" → buy <i>Crafting Kit</i> (300 Runes)",
    "Next to Kalé on the anvil: <i>Smithing Stone [1]</i>",
    "Run North along the path through the woods: <i>4x Kukri</i> (west side of the path)",
    "<i>4x Ruin Fragment</i> (east side of the path on some ruins)",
    { t:'tip', text:"Ruin Fragments are crafting materials that respawn every time you rest at a grace — just grab them on the way whenever you see them. They won't be listed each time." },
    "Go left around the big camp → Site of Grace: Gatefront",
    "Open inventory and use our keepsake: <i>Lands Between Rune</i> — also use the <i>Golden Rune [2]</i> we just picked up",
    "Rest at the grace to trigger cut scene with Melina → \"Accept\"",
    "<i>Spectral Steed Whistle</i>",
    "Level up: put all runes into Vigor",
    { t:'tip', text:"For now our priority is to have enough health to not die every time we get hit — so Vigor it is!" }
  ]
}
];

// ─── STATE ───────────────────────────────────────────────────
const KEY = 'er_guide_v1';
let S = {};
function load() { try { S = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { S = {}; } }
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }
function isRevealed(eid, idx) { return !!(S[eid] && S[eid].r && S[eid].r[idx]); }
function isDone(eid, idx)     { return !!(S[eid] && S[eid].d && S[eid].d[idx]); }
function setRevealed(eid, idx) {
  if (!S[eid]) S[eid] = {};
  if (!S[eid].r) S[eid].r = {};
  S[eid].r[idx] = true; save();
}
function toggleDone(eid, idx) {
  if (!S[eid]) S[eid] = {};
  if (!S[eid].d) S[eid].d = {};
  S[eid].d[idx] = !S[eid].d[idx]; save();
}
function resetAll() {
  if (!confirm('Reset all progress?')) return;
  S = {}; save(); render();
}
function resetEp(id) {
  if (!confirm('Reset progress for this episode?')) return;
  delete S[id]; save();
  const openEps = [...document.querySelectorAll('.ep.open')].map(e => e.id);
  render();
  openEps.forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('open'); });
}

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  load();
  const app = document.getElementById('app');
  app.innerHTML = '';
  let total = 0, done = 0;

  EPS.forEach(ep => {
    const checks = ep.steps.map((s,i) => typeof s === 'string' ? i : null).filter(i => i !== null);
    const epDone = checks.filter(i => isDone(ep.id, i)).length;
    total += checks.length;
    done  += epDone;
    const complete = epDone === checks.length && checks.length > 0;

    const div = document.createElement('div');
    div.className = 'ep' + (epDone > 0 ? ' has-done' : '') + (complete ? ' complete' : '');
    div.id = 'ep' + ep.id;

    let content = '<div class="ep-inner">';
    ep.steps.forEach((s, idx) => {
      if (typeof s === 'object') {
        if (s.t === 'sec')  content += `<div class="sec">${s.text}</div>`;
        if (s.t === 'warn') content += `<div class="warn">${s.text}</div>`;
        if (s.t === 'tip')  content += `<div class="tip">${s.text}</div>`;
      } else {
        const revealed = isRevealed(ep.id, idx);
        const done_    = isDone(ep.id, idx);
        const cls = done_ ? 'done' : (!revealed ? 'hidden' : '');
        content += `<div class="step ${cls}" data-ep="${ep.id}" data-idx="${idx}">
          <div class="cb"></div>
          <div class="step-txt">${s}</div>
        </div>`;
      }
    });
    content += '</div>';

    div.innerHTML = `
      <div class="ep-hdr" onclick="toggleEp(${ep.id})">
        <div class="ep-num">EP<br>${String(ep.id).padStart(2,'0')}</div>
        <div class="ep-name">${ep.title}</div>
        <div class="ep-stat ${complete ? 'ok' : ''}"></div>
        ${epDone > 0 ? `<button class="btn-ep-rst" onclick="event.stopPropagation();resetEp(${ep.id})">Reset</button>` : ''}
        <div class="ep-arr">▶</div>
      </div>
      <div class="ep-body">${content}</div>`;

    app.appendChild(div);
  });

  document.querySelectorAll('.step').forEach(el => {
    el.addEventListener('click', () => {
      const eid = +el.dataset.ep, idx = +el.dataset.idx;
      if (el.classList.contains('hidden')) {
        setRevealed(eid, idx);
      } else {
        toggleDone(eid, idx);
      }
      const openEps = [...document.querySelectorAll('.ep.open')].map(e => e.id);
      render();
      openEps.forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('open'); });
    });
  });


}

function toggleEp(id) {
  document.getElementById('ep' + id).classList.toggle('open');
}

load(); render();
</script>
</body>
</html>
